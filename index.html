<!DOCTYPE html>
<html lang="mg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAMY TELAZA 407 - Official</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
    --primary: #6366f1; --accent: #f43f5e; --bg: #0f172a;
    --card: #1e293b; --border: #334155; --text: #f8fafc;
    --success: #10b981; --warning: #f59e0b;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }
.app { max-width: 450px; margin: auto; min-height: 100vh; position: relative; }
header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; }
.logo-text { font-weight: 800; color: var(--primary); letter-spacing: 1px; cursor: pointer; }
.balance-box { background: linear-gradient(135deg, var(--primary), #4338ca); padding: 8px 15px; border-radius: 14px; font-weight: 800; color: white; }
#login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; justify-content: center; padding: 40px; }
.avatar-preview { width: 90px; height: 90px; border-radius: 50%; background: var(--card); margin: 0 auto 15px; border: 3px solid var(--primary); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: var(--primary); }
.page { display: none; padding: 20px; padding-bottom: 110px; animation: fadeIn 0.3s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 24px; margin-bottom: 20px; }
h3 { font-size: 0.7rem; text-transform: uppercase; color: #94a3b8; margin-bottom: 15px; letter-spacing: 1.5px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
.srv-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: rgba(255,255,255,0.03); border-radius: 16px; margin-bottom: 10px; border: 1px solid transparent; cursor: pointer; }
.srv-item.active { border-color: var(--primary); background: rgba(99, 102, 241, 0.1); }
.status-pill { font-size: 0.6rem; padding: 2px 8px; border-radius: 6px; font-weight: 800; margin-left: 8px; }
.online { background: rgba(16, 185, 129, 0.2); color: var(--success); }
.offline { background: rgba(244, 63, 94, 0.2); color: var(--accent); }
input { width: 100%; padding: 16px; background: #0f172a; border: 1px solid var(--border); border-radius: 14px; color: #fff; margin: 8px 0; font-family: inherit; }
.btn-action { width: 100%; padding: 18px; background: var(--primary); border: none; border-radius: 16px; color: #fff; font-weight: 800; cursor: pointer; transition: 0.3s; }
.btn-action:active { transform: scale(0.97); }
.hist-item { padding: 18px; border-radius: 20px; background: var(--card); margin-bottom: 12px; position: relative; overflow: hidden; border: 1px solid var(--border); }
.hist-status-bar { position: absolute; top: 0; left: 0; width: 5px; height: 100%; }
nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 410px; background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px; border-radius: 24px; border: 1px solid var(--border); z-index: 1000; }
.nav-link { color: #64748b; text-align: center; font-size: 0.65rem; cursor: pointer; flex: 1; }
.nav-link.active { color: var(--primary); }
.nav-link i { display: block; font-size: 1.4rem; margin-bottom: 4px; }
#modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 3000; padding: 20px; backdrop-filter: blur(8px); }
.modal-card { background: var(--card); border: 1px solid var(--border); width: 100%; max-width: 320px; border-radius: 28px; padding: 30px; text-align: center; }
</style>
</head>
<body>

<div class="app">
<div id="modal-overlay">
<div class="modal-card">
<div id="m-icon" style="font-size: 3rem; margin-bottom: 15px;"></div>
<div id="m-title" style="font-weight: 800; margin-bottom: 10px;"></div>
<div id="m-msg" style="opacity: 0.7; font-size: 0.9rem; margin-bottom: 25px;"></div>
<button id="m-ok" class="btn-action">OK, AZO SY AZO</button>
</div>
</div>

<div id="login-screen">
<div class="profile-setup" style="text-align:center;">
<div class="avatar-preview" onclick="handleLogoClick()"><i class="fas fa-user-shield"></i></div>
<h2 id="login-logo" style="margin:0; font-weight:800; color:var(--primary);">SAMY TELAZA 407</h2>
<p style="opacity:0.5; font-size:0.8rem;">Professional Social Booster</p>
</div>
<input type="text" id="user-name" placeholder="Anaranao (Pseudo)">
<input type="text" id="phone-input" placeholder="Laharana finday (03...)">
<button class="btn-action" onclick="login()">HIDITRA IZAO</button>
</div>

<header id="main-header" style="display:none;">
<div class="logo-text">SAMY TELAZA 407</div>
<div class="balance-box"><span id="user-solde">0</span> Ar</div>
</header>

<div id="page-boost" class="page">
<h3><i class="fas fa-layer-group"></i> Safidio ny sokajy</h3>
<div style="display: flex; gap: 10px; margin-bottom: 20px;">
<button class="btn-action cat-btn active" style="flex:1;" onclick="changeCat('fb', this)">FACEBOOK</button>
<button class="btn-action cat-btn" style="flex:1; background: #334155;" onclick="changeCat('tt', this)">TIKTOK</button>
</div>
<div id="list-services"></div>
<div class="card">
<input type="text" id="order-url" placeholder="Lien / Rohy (Facebook na TikTok)">
<input type="number" id="order-qty" value="100" min="100" oninput="calcTotal()">
<div style="display:flex; justify-content:space-between; align-items:center; margin: 15px 0;">
<span style="font-size: 0.8rem; font-weight: 700;">Vola aloa:</span>
<span style="color:var(--accent); font-size:1.4rem; font-weight: 900;"><span id="total-val">0</span> Ar</span>
</div>
<button class="btn-action" style="background:var(--success);" onclick="submitOrder()">HANAMARINA NY BAIKO</button>
</div>
</div>

<div id="page-solde" class="page">
<h3><i class="fas fa-university"></i> Depôt Vola</h3>
<div class="card" id="admin-numbers" style="background: linear-gradient(135deg, #4f46e5, #312e81); border:none;">
Chargement...
</div>
<input type="text" id="ref-id" placeholder="Référence Transfert">
<input type="number" id="ref-amt" placeholder="Vola nalefa (Ar)">
<button class="btn-action" onclick="submitRecharge()">HANDEFA FANAMARINANA</button>
</div>

<div id="page-history" class="page">
<h3><i class="fas fa-history"></i> Tantaran'ny kaontinao</h3>
<div id="history-content"></div>
</div>

<nav id="main-nav" style="display:none;">
<div class="nav-link active" onclick="nav('page-boost', this)"><i class="fas fa-rocket"></i>BOOST</div>
<div class="nav-link" onclick="nav('page-solde', this)"><i class="fas fa-wallet"></i>SOLDE</div>
<div class="nav-link" onclick="nav('page-history', this)"><i class="fas fa-list-alt"></i>HISTORY</div>
</nav>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, onSnapshot, addDoc, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD1a452y1hJKvf8c0YUJQIS7wP6lNpI8hs",
  authDomain: "boost-like-e9f42.firebaseapp.com",
  projectId: "boost-like-e9f42",
  storageBucket: "boost-like-e9f42.firebasestorage.app",
  messagingSenderId: "557758284766",
  appId: "1:557758284766:web:371c292b9b06c0d605934f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let userData = null;
let userPhone = null;
let logoClicks = 0;
let currentRate = 1.5;
let currentServiceName = "";
let services = { fb: [], tt: [] };

onSnapshot(doc(db, "config", "services"), (snap) => {
    if(snap.exists()) {
        services = snap.data();
        if(document.querySelector('.cat-btn.active')) {
            changeCat(document.querySelector('.cat-btn.active').innerText.toLowerCase().includes('fb')? 'fb' : 'tt', document.querySelector('.cat-btn.active'));
        }
    }
});

onSnapshot(doc(db, "config", "admin"), (snap) => {
    if(snap.exists()) {
        const data = snap.data();
        document.getElementById('admin-numbers').innerHTML = `
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>Mvola:</span> <strong>${data.mvola || '-'}</strong></div>
            <div style="display:flex; justify-content:space-between;"><span>Orange:</span> <strong>${data.orange || '-'}</strong></div>
            <div style="margin-top:15px; font-size:0.7rem; text-align:center; opacity:0.8;">Anarana: ${data.nom || '-'}</div>
        `;
    }
});

window.handleLogoClick = function() {
    logoClicks++;
    if(logoClicks >= 3) {
        const code = prompt("Ampidiro ny Code Admin:");
        if(code === "20202404") {
            window.location.href = "admin.html";
        }
        logoClicks = 0;
    }
}

function showModal(type, title, msg) {
    const overlay = document.getElementById('modal-overlay');
    document.getElementById('m-title').innerText = title;
    document.getElementById('m-msg').innerText = msg;
    document.getElementById('m-icon').innerHTML = type === 'success'? '<i class="fas fa-check-circle" style="color:var(--success)"></i>' : '<i class="fas fa-exclamation-triangle" style="color:var(--accent)"></i>';
    overlay.style.display = 'flex';
    document.getElementById('m-ok').onclick = () => overlay.style.display = 'none';
}

window.login = async function() {
    const name = document.getElementById('user-name').value;
    const phone = document.getElementById('phone-input').value;
    if(!name || phone.length < 10) return showModal('error', 'Tsy feno', 'Fenoy tsara ny mombamomba.');

    userPhone = phone;
    const userRef = doc(db, "users", phone);
    const snap = await getDoc(userRef);

    if(!snap.exists()) {
        await setDoc(userRef, { name: name, phone: phone, solde: 0, created: serverTimestamp() });
    }

    userData = (await getDoc(userRef)).data();
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-header').style.display = 'flex';
    document.getElementById('main-nav').style.display = 'flex';
    updateUI();
    nav('page-boost', document.querySelector('.nav-link'));
    changeCat('fb', document.querySelector('.cat-btn'));

    onSnapshot(userRef, (snap) => {
        if(snap.exists()) {
            userData = snap.data();
            updateUI();
        }
    });
}

window.nav = function(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
    if(id === 'page-history') renderHistory();
}

window.changeCat = function(type, el) {
    document.querySelectorAll('.cat-btn').forEach(b => { b.classList.remove('active'); b.style.background = "#334155"; });
    el.classList.add('active'); el.style.background = "var(--primary)";
    const list = document.getElementById('list-services');
    list.innerHTML = '';
    services[type].forEach((s, i) => {
        const div = document.createElement('div');
        div.className = `srv-item ${i===0?'active':''}`;
        if(i===0) { currentRate = s.r; currentServiceName = s.n; }
        div.innerHTML = `
            <div>
                <div style="font-weight:700;">${s.n} <span class="status-pill ${s.status}">${s.status.toUpperCase()}</span></div>
                <div style="font-size:0.65rem; opacity:0.5;">Fandefasana haingana</div>
            </div>
            <b style="color:var(--primary)">${s.r} Ar</b>`;

        div.onclick = () => {
            if(s.status === 'offline') return showModal('error', 'Miala tsiny', 'Ity tolotra ity dia mikatona aloha izao.');
            document.querySelectorAll('.srv-item').forEach(x => x.classList.remove('active'));
            div.classList.add('active');
            currentRate = s.r; currentServiceName = s.n; calcTotal();
        };
        list.appendChild(div);
    });
    calcTotal();
}

window.calcTotal = function() {
    const q = document.getElementById('order-qty').value;
    document.getElementById('total-val').innerText = (Math.floor(q * currentRate)).toLocaleString();
}

window.submitOrder = async function() {
    const url = document.getElementById('order-url').value;
    const qty = document.getElementById('order-qty').value;
    const total = Math.floor(qty * currentRate);
    if(!url || qty < 100) return showModal('error', 'Banga', 'Fenoy ny rohy sy ny isany (min 100).');
    if(userData.solde < total) return showModal('error', 'Tsy ampy solde', 'Mba mampidira solde aloha.');

    const userRef = doc(db, "users", userPhone);
    await updateDoc(userRef, { solde: increment(-total) });

    await addDoc(collection(db, "orders"), {
        phone: userPhone,
        name: userData.name,
        type: "Boost",
        service: currentServiceName,
        url: url,
        qty: parseInt(qty),
        amount: -total,
        status: "Pending",
        created: serverTimestamp()
    });

    showModal('success', 'Voaray!', 'Ny Admin no hanomboka ny boost-nao afaka fotoana fohy.');
    document.getElementById('order-url').value = "";
}

window.submitRecharge = async function() {
    const ref = document.getElementById('ref-id').value;
    const amt = document.getElementById('ref-amt').value;
    if(!ref ||!amt) return showModal('error', 'Banga', 'Fenoy ny référence sy ny vola.');

    await addDoc(collection(db, "orders"), {
        phone: userPhone,
        name: userData.name,
        type: "Recharge",
        amount: parseInt(amt),
        ref: ref,
        status: "Pending",
        created: serverTimestamp()
    });

    showModal('success', 'Andrasana', 'Hamarininay ny référence-nao.');
    document.getElementById('ref-id').value = '';
    document.getElementById('ref-amt').value = '';
}

function renderHistory() {
    const box = document.getElementById('history-content');
    onSnapshot(query(collection(db, "orders"), where("phone", "==", userPhone)), (snap) => {
        const orders = [];
        snap.forEach(doc => orders.push(doc.data()));
        orders.sort((a,b) => b.created?.seconds - a.created?.seconds);

        if(orders.length === 0) {
            box.innerHTML = '<p style="text-align:center; opacity:0.3; margin-top:50px;">Tsy misy tantara ato.</p>';
            return;
        }

        box.innerHTML = orders.map(h => `
            <div class="hist-item">
                <div class="hist-status-bar" style="background:${h.status==='Success'? 'var(--success)' : 'var(--warning)'}"></div>
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span style="font-weight:800; font-size:0.9rem;">${h.service || 'DEPOT SOLDE'}</span>
                    <b style="color:${h.amount > 0? 'var(--success)' : 'var(--accent)'}">${h.amount > 0? '+' : ''}${Math.abs(h.amount).toLocaleString()} Ar</b>
                </div>
                <div style="font-size:0.65rem; opacity:0.6; margin-bottom:8px; word-break:break-all;">${h.url || 'Ref: '+h.ref}</div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:0.6rem; opacity:0.5;">${h.created? new Date(h.created.seconds*1000).toLocaleString() : ''}</span>
                    <span style="font-size:0.65rem; font-weight:800; color:${h.status==='Success'?'var(--success)':'var(--warning)'}">${h.status.toUpperCase()}</span>
                </div>
            </div>
        `).join('');
    });
}

function updateUI() {
    document.getElementById('user-solde').innerText = userData.solde.toLocaleString();
}
</script>
</body>
</html>
